<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>

    <filter id="shadow">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Main Card -->
  <rect x="120" y="50" width="420" height="300" rx="20"
        fill="white" filter="url(#shadow)"/>

  <!-- Header -->
  <text x="150" y="90"
        fill="#9CA3AF"
        font-size="14"
        font-family="Inter">
    Scoring details
  </text>

  <text x="150" y="130"
        fill="#111827"
        font-size="42"
        font-weight="700"
        font-family="Inter">
    Daniel Destaw
  </text>

  <!-- Score Card -->
  <rect x="145" y="150"
        width="210"
        height="80"
        rx="12"
        fill="url(#card)"/>

  <text x="160" y="175"
        fill="white"
        font-size="13"
        font-family="Inter">
    Credit Score
  </text>

  <text x="160" y="210"
        fill="white"
        font-size="40"
        font-weight="700"
        font-family="Inter">
    0.82
  </text>

  <!-- Approval Card -->
  <rect x="350" y="140"
        width="210"
        height="90"
        rx="12"
        fill="white"
        filter="url(#shadow)"/>

  <text x="370" y="180"
        fill="#6B7280"
        font-size="14"
        font-family="Inter">
    Status
  </text>

  <text x="370" y="210"
        fill="#111827"
        font-size="28"
        font-weight="600"
        font-family="Inter">
    Approved
  </text>

  <circle cx="542" cy="180" r="10" fill="#22C55E"/>

  <path d="M538 180L541 183L547 177"
        stroke="white"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Table -->
  <g fill="#111827" font-family="Inter" font-size="15">
    <text x="155" y="270">0.25</text>
    <text x="230" y="270">Gender</text>
    <text x="340" y="270">Male</text>

    <text x="155" y="305">0.15</text>
    <text x="230" y="305">Date of Birth</text>
    <text x="340" y="305">13.10.1985</text>

    <text x="155" y="340">0.11</text>
    <text x="230" y="340">Occupation</text>
    <text x="340" y="340">Entrepreneur</text>
  </g>

  <!-- Avatar -->
  <circle cx="70" cy="210" r="70" fill="#F3F4F6"/>

  <circle cx="70" cy="185" r="22" fill="#D1D5DB"/>
  <path d="M35 260C35 225 105 225 105 260"
        fill="#D1D5DB"/>

</svg>