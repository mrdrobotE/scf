<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="primary" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>

    <filter id="shadow">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Connection Lines -->
  <path d="M170 150L350 230" stroke="#D8B4FE" stroke-width="3"/>
  <path d="M170 260L350 250" stroke="#D8B4FE" stroke-width="3"/>
  <path d="M170 370L350 270" stroke="#D8B4FE" stroke-width="3"/>

  <path d="M450 250L620 250" stroke="#A78BFA" stroke-width="4"/>

  <!-- Supplier Cards -->

  <rect x="40" y="100" width="140" height="90" rx="18"
        fill="white" filter="url(#shadow)"/>

  <circle cx="70" cy="130" r="10" fill="url(#primary)"/>

  <text x="90" y="135"
        fill="#111827"
        font-size="16"
        font-weight="600"
        font-family="Inter">
    Supplier
  </text>

  <text x="60" y="165"
        fill="#6B7280"
        font-size="12"
        font-family="Inter">
    Invoice Data
  </text>

  <!-- Manufacturer -->

  <rect x="40" y="210" width="140" height="90" rx="18"
        fill="white" filter="url(#shadow)"/>

  <rect x="60" y="230" width="20" height="20" rx="4"
        fill="url(#primary)"/>

  <text x="90" y="245"
        fill="#111827"
        font-size="16"
        font-weight="600"
        font-family="Inter">
    Manufacturer
  </text>

  <text x="60" y="275"
        fill="#6B7280"
        font-size="12"
        font-family="Inter">
    ERP Records
  </text>

  <!-- Distributor -->

  <rect x="40" y="320" width="140" height="90" rx="18"
        fill="white" filter="url(#shadow)"/>

  <polygon points="70,340 80,360 60,360"
           fill="url(#primary)"/>

  <text x="90" y="355"
        fill="#111827"
        font-size="16"
        font-weight="600"
        font-family="Inter">
    Distributor
  </text>

  <text x="60" y="385"
        fill="#6B7280"
        font-size="12"
        font-family="Inter">
    Trade History
  </text>

  <!-- SCF AI Core -->

  <circle cx="400" cy="250"
          r="70"
          fill="url(#primary)"
          filter="url(#shadow)"/>

  <circle cx="400" cy="250"
          r="48"
          fill="rgba(255,255,255,0.15)"
          stroke="white"
          stroke-width="2"/>

  <text x="365" y="235"
        fill="white"
        font-size="24"
        font-weight="700"
        font-family="Inter">
    SCF
  </text>

  <text x="375" y="260"
        fill="white"
        font-size="14"
        font-family="Inter">
    AI Core
  </text>

  <text x="345" y="290"
        fill="white"
        font-size="11"
        font-family="Inter">
    Federated Learning
  </text>

  <!-- Small Network Nodes -->

  <circle cx="400" cy="140" r="8" fill="#C4B5FD"/>
  <circle cx="510" cy="250" r="8" fill="#C4B5FD"/>
  <circle cx="400" cy="360" r="8" fill="#C4B5FD"/>
  <circle cx="290" cy="250" r="8" fill="#C4B5FD"/>

  <!-- Decision Card -->

  <rect x="560" y="150"
        width="180"
        height="200"
        rx="20"
        fill="white"
        filter="url(#shadow)"/>

  <text x="590" y="190"
        fill="#6B7280"
        font-size="14"
        font-family="Inter">
    Credit Decision
  </text>

  <text x="590" y="235"
        fill="#111827"
        font-size="42"
        font-weight="700"
        font-family="Inter">
    92
  </text>

  <text x="590" y="260"
        fill="#6B7280"
        font-size="13"
        font-family="Inter">
    Credit Score
  </text>

  <circle cx="690" cy="225"
          r="18"
          fill="#22C55E"/>

  <path d="M682 225L688 231L698 219"
        stroke="white"
        stroke-width="3"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <text x="590" y="300"
        fill="#111827"
        font-size="18"
        font-weight="600"
        font-family="Inter">
    Approved
  </text>

  <text x="590" y="325"
        fill="#6B7280"
        font-size="13"
        font-family="Inter">
    Risk: Low
  </text>

  <!-- Growth Card -->

  <rect x="300" y="420"
        width="200"
        height="55"
        rx="14"
        fill="#ECFDF5"/>

  <text x="330" y="452"
        fill="#16A34A"
        font-size="16"
        font-weight="700"
        font-family="Inter">
    ↗ Financing Approved
  </text>

</svg>